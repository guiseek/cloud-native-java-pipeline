server:
  port: 8080

spring:
  application:
    name: pagadoria-api

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/pagadoria
    username: pagadoria
    password: pagadoria
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: public

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://127.0.0.1:9080/realms/pagadoria
          # alternativa (se você preferir fixar a URL do jwk):
          # jwk-set-uri: http://127.0.0.1:8080/realms/pagadoria/protocol/openid-connect/certs

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true