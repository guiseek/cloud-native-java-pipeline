<div class="dashboard-page">
  <header class="topbar">
    <div>
      <h1>Pagadoria</h1>
      <p>Dashboard inicial</p>
    </div>

    <div class="topbar-actions">
      <button type="button" (click)="irParaPessoas()">Pessoas</button>
      <button class="logout" type="button" (click)="logout()">Sair</button>
    </div>
  </header>

  @if (loading) {
    <div class="state-card">
      Carregando informações...
    </div>
  } @else if (errorMessage) {
    <div class="state-card error">
      {{ errorMessage }}
    </div>
  } @else {
    <section class="cards">
      <article class="card">
        <span class="label">Pessoas cadastradas</span>
        <strong class="value">{{ resumo()?.quantidadePessoas }}</strong>
      </article>
    </section>
  }
</div>
