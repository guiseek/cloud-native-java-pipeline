<div class="dashboard-page">
  <h1>Dashboard</h1>
  <p class="subtitle">Visão geral inicial do sistema.</p>

  @if (loading()) {
    <div class="state-card">
      Carregando informações...
    </div>
  } @else if (errorMessage()) {
    <div class="state-card error">
      {{ errorMessage() }}
    </div>
  } @else {
    <div class="cards">
      <p-card header="Pessoas cadastradas">
        <a class="metric-link" routerLink="/pessoas" aria-label="Ir para a listagem de pessoas">
          <div class="metric-value">
            {{ resumo()?.quantidadePessoas ?? 0 }}
          </div>
          <span class="metric-caption">Abrir cadastro e listagem de pessoas</span>
        </a>
      </p-card>
    </div>
  }
</div>
